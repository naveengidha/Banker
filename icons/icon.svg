<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1a10"/>
      <stop offset="100%" stop-color="#050d07"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="rgba(255,212,71,0.65)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Gold border -->
  <rect x="16" y="16" width="480" height="480" rx="84" ry="84" fill="none" stroke="#ffd447" stroke-width="6" opacity="0.5"/>

  <!-- Dollar sign -->
  <text
    x="256" y="338"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="340"
    font-weight="bold"
    fill="#ffd447"
    text-anchor="middle"
    filter="url(#glow)"
  >$</text>
</svg>
